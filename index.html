<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>Email verified — CommCart</title>
  <style>
    :root { --green:#43C56F; --green-dark:#2E9F55; --ink:#0D2B28; --muted:#6B7280; --wash:#DEF5E7; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, #F7F7F8 0%, #DEF5E7 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; color: var(--ink); min-height: 100dvh;
    }
    .card {
      background: #fff; width: 100%; max-width: 420px; border-radius: 24px;
      padding: 40px 32px; text-align: center;
      box-shadow: 0 18px 48px rgba(13,43,40,0.14);
    }
    .badge {
      width: 96px; height: 96px; margin: 0 auto 24px; border-radius: 50%;
      background: linear-gradient(135deg, var(--green), #5AD181);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 28px rgba(67,197,111,0.45);
    }
    .badge svg { width: 48px; height: 48px; }
    h1 { font-size: 26px; margin: 0 0 12px; letter-spacing: -0.02em; }
    p { font-size: 16px; line-height: 1.5; color: var(--muted); margin: 0 auto; max-width: 320px; }
    .hint {
      margin-top: 24px; padding: 14px 16px; background: var(--wash);
      border-radius: 12px; font-size: 15px; font-weight: 600; color: var(--ink);
    }
    .brand { margin-top: 28px; font-size: 13px; font-weight: 700; color: var(--green-dark); letter-spacing: 0.04em; text-transform: uppercase; }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </svg>
    </div>
    <h1>Email verified!</h1>
    <p>Your account is all set. Head back to the CommCart app and log in with your email &amp; password.</p>
    <div class="hint">You can close this tab and open CommCart 🛒</div>
    <div class="brand">CommCart</div>
  </main>
</body>
</html>
